# Integrated pyramid MIM @ 224: dual-view band MAE + cos-gated SIGReg on E4.
#
# Pair with CLI:
#   --schedule configs/swinjepa/schedules/petiole_integrated_224.yaml
#   --coarse_mim_mode integrated
#   --stage_base_weights 0 0 0 100
#   --sigreg_s4_on e4
#   --backbone_embed_dim 36 --lat_dims 36 36 36 36 --fusion_heads 3
#   --s4_cosine_level 0.4
#   --sigreg_queue_len 2048 --sigreg_tokens_per_slice 0
#   --pca_every 25 --pca_samples 4 --pca_mode inference --pca_es_every 0

name: petiole_integrated_224

run:
  img_size: 224
  batch_size: 16

stages:
  s1:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s2:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s3:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s4:
    active:
      - {progress: 0.00, value: 1.0}
    beta_sig:
      - {progress: 0.00, value: 0.5}
    freeze:
      - {progress: 0.00, value: false}

augmentations:
  variant: tomo2
  crop_mode: resize
  global_views: 2
  local_views: 0
  window:
    p_low: 0.01
    p_high: 0.99
    sample_size: 100000
  blur:
    kernel_size: 7
    sigma: [0.1, 1.0]
  poisson:
    scale: 10000
  pixel_mask:
    ratio: 0.15
  normalize:
    mean: 0.5
    std: 0.5
