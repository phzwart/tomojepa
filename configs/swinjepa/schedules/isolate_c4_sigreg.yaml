# Isolate C4-only training: predictor/MAE weight on s4 only, SIGReg on s4 only.
#
# Pair with CLI:
#   --stage_base_weights 0 0 0 1
#   --sigreg_queue_len 2048 --sigreg_tokens_per_slice 0
#
# Each stage s1..s4 has its own SIGReg FIFO on the matching band residual
# (S2-S1, S3-S2, S4-S3@s3, S4-S3@s4). ``sigreg_tokens_per_slice 0`` uses all
# FG tokens on the s4 grid only (~49 at 448/resize).

name: isolate_c4_sigreg

stages:
  s1:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s2:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s3:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s4:
    active:
      - {progress: 0.00, value: 1.0}
    beta_sig:
      - {progress: 0.00, value: 0.5}
    freeze:
      - {progress: 0.00, value: false}
