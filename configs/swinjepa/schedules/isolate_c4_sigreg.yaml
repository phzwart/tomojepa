# Isolate C4-only training: cross-attn MAE + SIGReg on E4 (default isolate).
#
# Pair with CLI:
#   --stage_base_weights 0 0 0 10
#   --coarse_mim_mode cross_attn
#   --sigreg_s4_on e4
#
# For MAE-only use isolate_c4_mae_only.yaml; for SIGReg-first + MAE ramp use
# isolate_c4_sigreg_e4_warmup.yaml. Do not use sigreg_s4_on=c4 with MAE on C4.

name: isolate_c4_sigreg

stages:
  s1:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s2:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s3:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s4:
    active:
      - {progress: 0.00, value: 1.0}
    beta_sig:
      - {progress: 0.00, value: 0.01}
    freeze:
      - {progress: 0.00, value: false}
