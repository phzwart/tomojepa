# Isolate C4: SIGReg on E4 first, then ramp cross-attn MAE (pred_active 0→1 @ 25%).
#
# CLI:
#   --stage_base_weights 0 0 0 10
#   --coarse_mim_mode cross_attn
#   --sigreg_s4_on e4
#   --sigreg_queue_len 2048 --sigreg_tokens_per_slice 0

name: isolate_c4_sigreg_e4_warmup

stages:
  s1:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s2:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s3:
    active:
      - {progress: 0.00, value: 0.0}
    beta_sig:
      - {progress: 0.00, value: 0.0}
    freeze:
      - {progress: 0.00, value: false}

  s4:
    active:
      - {progress: 0.00, value: 1.0}
    pred_active:
      - {progress: 0.00, value: 0.0}
      - {progress: 0.25, value: 1.0}
    beta_sig:
      - {progress: 0.00, value: 0.01}
    freeze:
      - {progress: 0.00, value: false}
